<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>صفحه پیدا نشد | الکترون</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F8F9FA;
        color: #212224;
        font-family: 'Vazirmatn', sans-serif;
        text-align: center;
        padding: 24px;
      }
      .wrap { max-width: 420px; }
      .code { font-size: 15px; letter-spacing: .25em; color: #C1121F; font-weight: 600; margin-bottom: 18px; }
      h1 { font-size: 26px; font-weight: 800; margin: 0 0 12px; }
      p { font-size: 15px; line-height: 1.9; color: #6b6b6e; margin: 0 0 28px; }
      a {
        display: inline-block;
        background: #C1121F;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        padding: 12px 26px;
        border-radius: 999px;
      }
      svg { margin-bottom: 22px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <svg width="46" height="46" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="3.2" fill="#C1121F" />
        <ellipse cx="20" cy="20" rx="17" ry="7" stroke="#C1121F" stroke-width="1.1" opacity="0.55" />
        <ellipse cx="20" cy="20" rx="17" ry="7" stroke="#212224" stroke-width="1.1" opacity="0.35" transform="rotate(60 20 20)" />
        <ellipse cx="20" cy="20" rx="17" ry="7" stroke="#212224" stroke-width="1.1" opacity="0.2" transform="rotate(120 20 20)" />
      </svg>
      <div class="code">۴۰۴ · صفحه یافت نشد</div>
      <h1>این مسیر وجود ندارد</h1>
      <p>ممکن است آدرس اشتباه تایپ شده باشد یا این صفحه جابه‌جا شده باشد.</p>
      <a href="/">بازگشت به الکترون</a>
    </div>
  </body>
</html>
